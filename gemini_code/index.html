<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
        }

        canvas {
            background-color: #34495e;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
        }

        #game-over-text {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <h1>Classic Snake</h1>
    <div id="score-board">Score: <span id="score">0</span></div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="game-over-screen">
            <div id="game-over-text">Game Over!</div>
            <button onclick="resetGame()">Restart Game (Enter)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoopId;
        let isGameOver = false;
        let changingDirection = false;
        let hasStarted = false;

        function initGame() {
            // Initial snake position (center)
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) }
            ];
            
            // Initial movement direction (right)
            dx = 1;
            dy = 0;
            score = 0;
            isGameOver = false;
            changingDirection = false;
            
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            
            placeFood();
            
            if (gameLoopId) clearInterval(gameLoopId);
            gameLoopId = setInterval(gameLoop, 100);
        }

        function gameLoop() {
            changingDirection = false;
            update();
            draw();
        }

        function update() {
            if (isGameOver) return;

            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collision checking
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision checking
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head); // Add new head

            // Check if food eaten
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                placeFood();
            } else {
                snake.pop(); // Remove tail if no food eaten
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc((food.x * gridSize) + (gridSize / 2), (food.y * gridSize) + (gridSize / 2), gridSize / 2 - 2, 0, 2 * Math.PI);
            ctx.fill();

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#2ecc71' : '#27ae60';
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function placeFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                // Ensure food doesn't spawn on the snake
                validPosition = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoopId);
            document.getElementById('game-over-text').innerText = 'Game Over!';
            document.querySelector('#game-over-screen button').innerText = 'Restart Game (Enter)';
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            hasStarted = true;
            initGame();
        }

        function showStartScreen() {
            document.getElementById('game-over-text').innerText = 'Ready?';
            document.querySelector('#game-over-screen button').innerText = 'Start Game (Enter)';
            gameOverScreen.style.display = 'flex';
        }

        // Keyboard controls
        document.addEventListener('keydown', (event) => {
            const ENTER_KEY = 13;
            if (event.keyCode === ENTER_KEY) {
                if (!hasStarted || isGameOver) {
                    resetGame();
                    return;
                }
            }

            if (isGameOver || changingDirection || !hasStarted) return;

            const LEFT_KEY = 37;
            const UP_KEY = 38;
            const RIGHT_KEY = 39;
            const DOWN_KEY = 40;
            const W_KEY = 87;
            const A_KEY = 65;
            const S_KEY = 83;
            const D_KEY = 68;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            switch (event.keyCode) {
                case LEFT_KEY:
                case A_KEY:
                    if (!goingRight) { dx = -1; dy = 0; changingDirection = true; }
                    break;
                case UP_KEY:
                case W_KEY:
                    if (!goingDown) { dx = 0; dy = -1; changingDirection = true; }
                    break;
                case RIGHT_KEY:
                case D_KEY:
                    if (!goingLeft) { dx = 1; dy = 0; changingDirection = true; }
                    break;
                case DOWN_KEY:
                case S_KEY:
                    if (!goingUp) { dx = 0; dy = 1; changingDirection = true; }
                    break;
            }
        });

        // Show start screen initially
        ctx.fillStyle = '#34495e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        showStartScreen();
    </script>
</body>
</html>
